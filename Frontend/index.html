<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="user-info">
                <h2>ChatApp</h2>
                <p>Online</p>
            </div>
        </header>

        <main class="chat-messages">
            <div class="message incoming">
                <p>Hey there! Welcome to the simple chat app. 👋</p>
                <span class="time">10:00 AM</span>
            </div>
            
            <div class="message outgoing">
                <p>Wow, this looks really clean! How did you build it?</p>
                <span class="time">10:02 AM</span>
            </div>

            <div class="message incoming">
                <p>Just simple HTML and CSS using Flexbox!</p>
                <span class="time">10:03 AM</span>
            </div>
        </main>

        <footer class="chat-input-area">
            <input type="text" placeholder="Type a message..." class="message-input">
            <button class="send-button">Send</button>
        </footer>
    </div>

</body>
</html>
